<div class="clients-hero">
  <div class="hero-inner">
    <h1 class="clients-title">Usuarios</h1>
    <div class="filters-card">
      <form [formGroup]="filtrosForm" (ngSubmit)="aplicarFiltros()">
        <div class="row g-3 align-items-end mx-0">
          <div class="col-auto field-nombre align-self-center">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Nombre" formControlName="nombre">
          </div>
          <div class="col-auto field-email align-self-center">
            <label class="form-label">Email</label>
            <input type="text" class="form-control" placeholder="Email" formControlName="email">
          </div>
          <div class="col-auto filters-actions d-flex flex-column align-items-end gap-2">
            <button type="button" class="btn btn-secondary filter-btn" (click)="limpiarFiltros()">Limpiar filtros</button>
            <button type="submit" class="btn btn-primary filter-btn apply-btn">Aplicar Filtros</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="clients-body">
  <app-spinner [isLoading]="isLoading"></app-spinner>

  <div class="table-card" *ngIf="!isLoading">
    <div class="table-responsive">
      <table class="table clients-table align-middle mb-0">
        <thead>
          <tr>
            <th class="sortable" (click)="sortBy('id')">
              <span>ID</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='id' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='id' && sortDirection==='desc', 'bi-caret-down': sortField!=='id'}"></i>
            </th>
            <th class="sortable" (click)="sortBy('username')">
              <span>Usuario</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='username' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='username' && sortDirection==='desc', 'bi-caret-down': sortField!=='username'}"></i>
            </th>
            <th class="sortable" (click)="sortBy('firstName')">
              <span>Nombre</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='firstName' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='firstName' && sortDirection==='desc', 'bi-caret-down': sortField!=='firstName'}"></i>
            </th>
            <th class="sortable" (click)="sortBy('lastName')">
              <span>Apellido</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='lastName' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='lastName' && sortDirection==='desc', 'bi-caret-down': sortField!=='lastName'}"></i>
            </th>
            <th class="sortable" (click)="sortBy('email')">
              <span>Email</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='email' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='email' && sortDirection==='desc', 'bi-caret-down': sortField!=='email'}"></i>
            </th>
            <th class="sortable" (click)="sortBy('rol')">
              <span>Rol</span>
              <i class="bi" [ngClass]="{'bi-caret-up-fill': sortField==='rol' && sortDirection==='asc', 'bi-caret-down-fill': sortField==='rol' && sortDirection==='desc', 'bi-caret-down': sortField!=='rol'}"></i>
            </th>
            <th class="text-center acciones-header" aria-label="Acciones"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let usuario of usuariosFiltrados">
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.firstName }}</td>
            <td>{{ usuario.lastName }}</td>
            <td>{{ usuario.email }}</td>
            <td>{{ usuario.rol }}</td>
            <td class="text-center actions-cell">
              <button class="btn btn-warning btn-sm" (click)="editarCliente(usuario)" title="Editar" aria-label="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-danger btn-sm" (click)="eliminarCliente(usuario.id)" title="Eliminar" aria-label="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer-actions">
      <div class="table-count">Mostrando {{ usuariosFiltrados.length }} registros</div>
      <div class="table-buttons">
        <button type="button" class="btn table-btn table-btn-csv" (click)="exportCsv()">Exportar CSV</button>
        <button type="button" class="btn table-btn table-btn-new" (click)="abrirModalAltaUsuario()">Nuevo Usuario +</button>
      </div>
    </div>
  </div>
</div>
