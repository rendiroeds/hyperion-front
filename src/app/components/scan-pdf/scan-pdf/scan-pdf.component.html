<div class="pdf-hero">
  <div class="pdf-hero-inner">
    <h1 class="pdf-title">PDFs</h1>
    <div class="pdf-upload-card">
      <div class="row g-3 align-items-end mx-0">
        <div class="col-auto">
          <label class="form-label">Subir Archivo PDF</label>
          <div class="pdf-upload-actions">
            <label for="fileInput" class="btn btn-primary pdf-action-btn">
              <i class="bi bi-upload"></i> Seleccionar PDF
            </label>
            <input type="file" id="fileInput" class="d-none" accept=".pdf,application/pdf" (change)="onFileSelected($event)" />
            <button class="btn btn-success pdf-action-btn pdf-process-btn" [disabled]="!fileSelected" (click)="uploadFile()">
              <i class="bi bi-file-earmark-arrow-down"></i> Procesar y Descargar
            </button>
          </div>
          <div *ngIf="fileName" class="pdf-selected-file d-flex align-items-center flex-wrap gap-2">
            <span>Archivo seleccionado:</span>
            <span class="pdf-file-name">{{ fileName }}</span>
            <button type="button" class="btn btn-outline-danger btn-sm pdf-clear-btn" (click)="clearSelection()" aria-label="Borrar archivo">
              &times;
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="pdf-body"></div>
