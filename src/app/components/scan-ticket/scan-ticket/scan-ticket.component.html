<div class="container my-4">
  <h2>Escaneo y carga de Ticket Fiscal</h2>
  <div class="mb-3">
    <label for="fileInput" class="form-label">Seleccionar imagen de ticket</label>
    <input id="fileInput" type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">
    <div *ngIf="fileName">Archivo seleccionado: {{fileName}}</div>
  </div>
  <button class="btn btn-primary" (click)="uploadTicket()" [disabled]="!fileSelected || loading">Subir y procesar</button>

  <div class="mt-3" *ngIf="loading">
    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Procesando...</span></div>
    <span>Procesando ticket...</span>
  </div>
  <div *ngIf="errorMsg" class="alert alert-danger mt-3">{{errorMsg}}</div>
  <div *ngIf="successMsg" class="alert alert-success mt-3">{{successMsg}}</div>

  <button *ngIf="showDownloadButton" class="btn btn-success mt-2" (click)="downloadCsv()">Descargar CSV</button>
</div>
